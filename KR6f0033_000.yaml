front:
  text: 聖善住意天子所問經翻譯之記夫法留正像唯聖是依季行此世非賢豈伏三藏法師毘目智仙出自烏萇剎利王種幼履慈蹤長躡悲跡攝化群迷誡惡導善常為眾生不請之友執此法燈照彼昏闇魏皇都鄴崇福以資興和二年歲次實沈佛法加持出此經典名善住意天子所問建午閏月朔次丁丑戊寅建功乙巳畢功助譯弟子瞿曇流支對譯沙門曇林之筆庶俟存道敬法之賢如實印記示令不惑耳
